<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#grad)"/>
  
  <!-- White inner box -->
  <rect x="18" y="18" width="64" height="64" rx="12" fill="white"/>
  
  <!-- PDF document lines -->
  <rect x="32" y="35" width="36" height="4" rx="2" fill="url(#grad)" opacity="0.8"/>
  <rect x="32" y="48" width="28" height="4" rx="2" fill="url(#grad)" opacity="0.6"/>
  <rect x="32" y="61" width="32" height="4" rx="2" fill="url(#grad)" opacity="0.4"/>
  
  <!-- E letter (for Easy) -->
  <rect x="42" y="30" width="3" height="40" rx="1.5" fill="url(#grad)"/>
  <rect x="42" y="30" width="18" height="3" rx="1.5" fill="url(#grad)"/>
  <rect x="42" y="48" width="14" height="3" rx="1.5" fill="url(#grad)"/>
  <rect x="42" y="67" width="18" height="3" rx="1.5" fill="url(#grad)"/>
</svg>