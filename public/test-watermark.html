<!DOCTYPE html>
<html>
<head>
    <title>Test Watermark</title>
</head>
<body>
    <h1>Test Watermark</h1>
    <input type="file" id="fileInput" accept=".pdf">
    <input type="text" id="watermarkText" placeholder="Enter watermark text" value="CONFIDENTIAL">
    <button onclick="testWatermark()">Add Watermark</button>
    
    <script>
        async function testWatermark() {
            const file = document.getElementById('fileInput').files[0];
            const text = document.getElementById('watermarkText').value;
            
            if (!file) {
                alert('Please select a PDF file');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('text', text);
            
            const response = await fetch('http://localhost:3000/api/watermark', {
                method: 'POST',
                body: formData
            });
            
            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'watermarked.pdf';
                a.click();
                alert('Watermark added! Check your downloads.');
            } else {
                alert('Error: ' + await response.text());
            }
        }
    </script>
</body>
</html>
